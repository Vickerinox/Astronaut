[package]
name = "reboot"
version = "0.1.0"
edition = "2021"

[dependencies]

[profile.release]
opt-level = 'z'                             # Optimize for size
lto = true                                  # Enable link-time optimization
codegen-units = 1                           # Reduce number of codegen units to increase optimizations
panic = 'abort'                             # Abort on panic
strip = true                                # Strip symbols from binary*

[profile.dev]
panic='abort'

[target.armv5te-unknown-linux-gnueabi.linker]                # All targets
rustflags = ["-C", "relocation-model=pic"]  # Set the ptr jumps to PIC (Position-Independent Code)
